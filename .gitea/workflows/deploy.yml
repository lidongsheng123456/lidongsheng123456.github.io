name: 🚀 构建并部署到阿里云

on:
  push:
    branches:
      - main  # 或者你的主分支名称
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: bun
    
    steps:
      - name: 📋 检出代码仓库
        uses: http://192.168.192.1:3000/git/checkout@main
        with:
          fetch-depth: 0
          ref: main

      - name: 🔍 调试信息
        run: |
          echo "📁 当前工作目录: $(pwd)"
          echo "🌿 当前分支: ${{ gitea.ref_name }}"
          echo "📦 仓库: ${{ gitea.repository }}"
          echo "👤 操作者: ${{ gitea.actor }}"
          echo "⚡ 触发事件: ${{ gitea.event_name }}"
          echo "📅 构建时间: $(date)"
          echo "📄 检查 workflow 文件:"
          ls -la .gitea/workflows/ || echo "❌ .gitea/workflows 目录不存在"

      # 3. 📦 安装依赖
      - name: 📦 安装依赖
        run: bun install --force

      # 4. 🔨 构建项目
      - name: 🔨 构建项目
        run: bun run build

      # 5. 📤 上传到阿里云服务器
      - name: 📤 上传到阿里云服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: ${{ secrets.ALIYUN_PORT }}
          source: "dist/*"
          target: /home/server/lds_blog

      # 6. ✅ 执行部署后命令
      - name: ✅ 执行部署后命令
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: ${{ secrets.ALIYUN_PORT }}
          script: |
            echo "Deployment completed at $(date)"
            # 如果需要重启服务，可以在这里添加命令
            # cd ${{ secrets.ALIYUN_TARGET_PATH }}
            # pm2 restart your-app-name
